keys:
  - &admin age1pvhdtd73kzap707an0g8fqpr3jqjjfh6x6dez4gw4hza7helffcsym6sgm
  - &pebble age1967s7ux5z32ak6yn2gzs0pghs7gm7qe4smrgyhge0xa3l2xgzuhsszwrfn
  - &vps age1vkupqmrupls5qam4fwxcfa955zzmec3ft9klrcmuyyj4tzj48ddqssh75u
  - &admin-gpg 6C4D33083EDEF83D043C897BD4ADECA93F52036C

creation_rules:
  - path_regex: secrets/secrets\.yaml$
    key_groups:
      - age:
          - *admin
          - *pebble
        pgp:
          - *admin-gpg

  # VPS host key is active (see &vps above and *vps in creation rules below).
  # To add a new host: just gen-<host>-hostkey, add &<host> to keys,
  # add *<host> to relevant creation_rules, then run: just rekey
  - path_regex: secrets/vps\.yaml$
    key_groups:
      - age:
          - *admin
          - *vps
        pgp:
          - *admin-gpg
